name: Build and Release

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore NuGet packages
      run: dotnet restore

    - name: Set Versioning
      id: versioning
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = "1.0.0.0" # 기본값
        
        if ("${{ github.ref_type }}" -eq "tag") {
          $version = $tag -replace '^v', ''
          echo "Detected tag version: $version"
        } else {
          # 태그가 아닐 경우 csproj에서 추출
          [xml]$csproj = Get-Content WpfAutoUpdater/WpfAutoUpdater.csproj
          $version = $csproj.Project.PropertyGroup.Version
          echo "Using csproj version: $version"
        }
        
        # 버전 검증 및 로그
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "::notice ::Building WpfAutoUpdater with version $version"

    - name: Build
      run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.versioning.outputs.VERSION }} -p:AssemblyVersion=${{ steps.versioning.outputs.VERSION }} -p:FileVersion=${{ steps.versioning.outputs.VERSION }}

    - name: Publish
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.versioning.outputs.VERSION }} -p:AssemblyVersion=${{ steps.versioning.outputs.VERSION }} -p:FileVersion=${{ steps.versioning.outputs.VERSION }} -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WpfAutoUpdater
        path: ./publish/WpfAutoUpdater.exe
        retention-days: 30

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: WpfAutoUpdater
        path: ./artifacts

    - name: Get changelog
      id: changelog
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^v', ''
        @"
        ## What's Changed

        - WPF AutoUpdater v${version} Release
        - Modern WPF UI with rounded corners and blue theme
        - Async/await based thread-safe download
        - FTP, GitHub Releases, and Direct URL support

        ## Download

        Download the exe file from the Assets section below.
        "@ | Out-File -FilePath changelog.md -Encoding utf8
        Get-Content changelog.md

    - name: Edit release
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const changelog = fs.readFileSync('changelog.md', 'utf8');
          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            name: context.ref_name,
            body: changelog,
            make_latest: 'true'
          });

    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/WpfAutoUpdater.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}