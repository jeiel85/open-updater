name: Build and Release

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore NuGet packages
      run: dotnet restore

    - name: Set Versioning
      id: versioning
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = "1.0.0"

        if ("${{ github.ref_type }}" -eq "tag") {
          $version = $tag -replace '^v', ''
          echo "Detected tag version: $version"
        } else {
          [xml]$csproj = Get-Content WpfAutoUpdater/WpfAutoUpdater.csproj
          $version = $csproj.Project.PropertyGroup.Version
          echo "Using csproj version: $version"
        }

        # AssemblyVersion/FileVersion은 .NET이 4자리를 요구하므로 .0 패딩
        $parts = $version.Split('.')
        $assemblyVersion = if ($parts.Count -eq 3) { "$version.0" } else { $version }

        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "ASSEMBLY_VERSION=$assemblyVersion" >> $env:GITHUB_OUTPUT
        echo "::notice ::Building version $version (assembly: $assemblyVersion)"

    - name: Build
      run: dotnet build WpfAutoUpdater/WpfAutoUpdater.csproj --configuration Release --no-restore -p:Version=${{ steps.versioning.outputs.VERSION }} -p:AssemblyVersion=${{ steps.versioning.outputs.ASSEMBLY_VERSION }} -p:FileVersion=${{ steps.versioning.outputs.ASSEMBLY_VERSION }}

    - name: Publish
      run: dotnet publish WpfAutoUpdater/WpfAutoUpdater.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.versioning.outputs.VERSION }} -p:AssemblyVersion=${{ steps.versioning.outputs.ASSEMBLY_VERSION }} -p:FileVersion=${{ steps.versioning.outputs.ASSEMBLY_VERSION }} -o ./publish

    - name: Verify Build Version
      shell: pwsh
      run: |
        $expectedVersion = "${{ steps.versioning.outputs.VERSION }}"
        $exePath = "./publish/OpenUpdater.exe"

        if (!(Test-Path $exePath)) {
          Write-Error "Executable not found at $exePath"
          exit 1
        }

        $fileVersion = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exePath).FileVersion
        $productVersion = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exePath).ProductVersion

        echo "Expected Version: $expectedVersion"
        echo "File Version: $fileVersion"
        echo "Product Version: $productVersion"

        if ($fileVersion.StartsWith($expectedVersion)) {
          echo "::notice ::Version verification successful: $fileVersion"
        } else {
          echo "::error ::Version mismatch! Expected $expectedVersion but got $fileVersion"
          exit 1
        }

    - name: Create Zip for Release
      shell: pwsh
      run: Compress-Archive -Path ./publish/* -DestinationPath ./publish/OpenUpdater.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenUpdater-Binary
        path: |
          ./publish/OpenUpdater.exe
          ./publish/OpenUpdater.zip
        retention-days: 30

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: OpenUpdater-Binary
        path: ./artifacts

    - name: Get changelog
      id: changelog
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^v', ''
        $body = @"
        ## What's Changed

        - WPF AutoUpdater v${version} Release
        - Modern WPF UI with rounded corners and blue theme
        - Async/await based thread-safe download
        - FTP, GitHub Releases, and Direct URL support

        ## Download

        Download the executable or zip file from the Assets section below.
        "@
        $body | Out-File -FilePath changelog.md -Encoding utf8
        Write-Host $body

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/OpenUpdater.exe
          ./artifacts/OpenUpdater.zip
        body_path: changelog.md
        name: ${{ github.ref_name }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}